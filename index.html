<!doctype html>
<html lang="ko" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="TXT 소설을 편하게 읽는 뷰어. 기기 간 동기화, 북마크, 메모 지원."
    />
    <title>소설 뷰어</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0e0d0b" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="src/css/base.css" />
    <link rel="stylesheet" href="src/css/themes.css" />
    <link rel="stylesheet" href="src/css/layout.css" />
    <link rel="stylesheet" href="src/css/components.css" />
  </head>
  <body>
    <!-- ══════════════════════════════════════
       로그인 오버레이
       로그인 전 또는 로그인 버튼 클릭 시 표시
  ══════════════════════════════════════ -->
    <div id="auth-overlay" class="auth-overlay hidden">
      <div class="auth-card">
        <div class="auth-logo">📖</div>
        <h1 class="auth-title">소설 뷰어</h1>
        <p class="auth-desc">
          기기 어디서든 이어 읽는<br />나만의 소설 독서 공간
        </p>
        <button id="btn-google-login" class="btn-google">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path
              d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"
              fill="#4285F4"
            />
            <path
              d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"
              fill="#34A853"
            />
            <path
              d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"
              fill="#FBBC05"
            />
            <path
              d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"
              fill="#EA4335"
            />
          </svg>
          Google로 계속하기
        </button>
        <button id="btn-guest" class="btn-guest">로그인 없이 사용하기</button>
        <p class="auth-note">
          로그인하면 기기 간 읽기 위치가 자동으로 동기화돼요
        </p>
      </div>
    </div>

    <!-- ══════════════════════════════════════
       앱 껍데기 (로그인 후 표시)
  ══════════════════════════════════════ -->
    <div id="app" class="app hidden">
      <!-- ── 상단 바 ── -->
      <header class="topbar">
        <div class="topbar-left">
          <button
            id="btn-sidebar-toggle"
            class="icon-btn"
            title="목차 열기/닫기 (T)"
          >
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <rect y="2" width="16" height="1.5" rx="0.75" />
              <rect y="7.25" width="10" height="1.5" rx="0.75" />
              <rect y="12.5" width="13" height="1.5" rx="0.75" />
            </svg>
          </button>
          <span class="book-title" id="book-title">소설 뷰어</span>
        </div>

        <div class="topbar-center">
          <!-- 진행률 바 -->
          <div class="progress-wrap" id="progress-wrap" style="display: none">
            <div class="progress-bar">
              <div
                class="progress-fill"
                id="progress-fill"
                style="width: 0%"
              ></div>
            </div>
            <span class="progress-text" id="progress-text">0%</span>
          </div>
        </div>

        <div class="topbar-right">
          <button
            id="btn-search"
            class="icon-btn"
            title="검색 (Ctrl+F)"
            style="display: none"
          >
            <svg
              width="15"
              height="15"
              viewBox="0 0 15 15"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <circle cx="6.5" cy="6.5" r="4.5" />
              <line x1="10.5" y1="10.5" x2="14" y2="14" />
            </svg>
          </button>
          <button
            id="btn-bookmark-add"
            class="icon-btn"
            title="북마크 추가 (B)"
            style="display: none"
          >
            <svg
              width="14"
              height="16"
              viewBox="0 0 14 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path d="M1 1h12v14l-6-4-6 4V1z" />
            </svg>
          </button>
          <button id="btn-settings" class="icon-btn" title="설정">
            <svg
              width="16"
              height="16"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.4"
            >
              <circle cx="8" cy="8" r="2.5" />
              <path
                d="M8 1v2M8 13v2M1 8h2M13 8h2M2.93 2.93l1.41 1.41M11.66 11.66l1.41 1.41M2.93 13.07l1.41-1.41M11.66 4.34l1.41-1.41"
              />
            </svg>
          </button>
          <div class="user-avatar" id="user-avatar" title="계정">
            <span id="user-initial">?</span>
          </div>
        </div>
      </header>

      <!-- ── 메인 영역 ── -->
      <div class="main-wrap">
        <!-- 사이드바 (목차 + 북마크) -->
        <aside class="sidebar" id="sidebar">
          <div class="sidebar-tabs">
            <button class="stab active" data-tab="toc">목차</button>
            <button class="stab" data-tab="bookmarks">북마크</button>
          </div>

          <!-- 목차 -->
          <div class="sidebar-panel" id="panel-toc">
            <div class="toc-list" id="toc-list">
              <p class="sidebar-empty">
                소설을 불러오면<br />목차가 여기 표시돼요
              </p>
            </div>
          </div>

          <!-- 북마크 -->
          <div class="sidebar-panel hidden" id="panel-bookmarks">
            <div class="bookmark-list" id="bookmark-list">
              <p class="sidebar-empty">
                북마크가 없어요<br />B키로 추가할 수 있어요
              </p>
            </div>
          </div>
        </aside>

        <!-- 콘텐츠 영역 -->
        <main class="content-area" id="content-area">
          <!-- 업로드 화면 (파일 없을 때) -->
          <div class="upload-screen" id="upload-screen">
            <div class="upload-drop-zone" id="drop-zone">
              <div class="upload-icon">📄</div>
              <p class="upload-title">TXT 파일을 여기에 드래그하거나</p>
              <label class="btn-upload" for="file-input">파일 선택하기</label>
              <input
                type="file"
                id="file-input"
                accept=".txt"
                class="visually-hidden"
              />
              <p class="upload-note">UTF-8 · EUC-KR 인코딩 자동 감지</p>
            </div>

            <!-- 최근 읽은 책 (로그인 시) -->
            <div class="recent-books" id="recent-books" style="display: none">
              <h3 class="recent-title">최근에 읽은 책</h3>
              <div class="recent-list" id="recent-list"></div>
            </div>
          </div>

          <!-- 뷰어 (파일 로드 후) -->
          <div class="reader-wrap hidden" id="reader-wrap">
            <div class="reader" id="reader">
              <!-- JS가 챕터별 섹션을 동적으로 생성 -->
            </div>
          </div>
        </main>
      </div>
      <!-- /main-wrap -->

      <!-- ── 검색 바 ── -->
      <div class="search-bar hidden" id="search-bar">
        <input
          type="text"
          id="search-input"
          placeholder="검색어 입력..."
          class="search-input"
        />
        <span class="search-count" id="search-count"></span>
        <button class="icon-btn" id="btn-search-prev" title="이전">↑</button>
        <button class="icon-btn" id="btn-search-next" title="다음">↓</button>
        <button class="icon-btn" id="btn-search-close" title="닫기">✕</button>
      </div>

      <!-- ── 설정 패널 (슬라이드인) ── -->
      <div class="settings-panel hidden" id="settings-panel">
        <div class="settings-header">
          <span>설정</span>
          <button class="icon-btn" id="btn-settings-close">✕</button>
        </div>
        <div class="settings-body">
          <!-- 테마 -->
          <div class="settings-group">
            <label class="settings-label">테마</label>
            <div class="theme-btns">
              <button class="theme-btn active" data-theme="dark">다크</button>
              <button class="theme-btn" data-theme="light">라이트</button>
              <button class="theme-btn" data-theme="sepia">세피아</button>
            </div>
          </div>

          <!-- 글꼴 -->
          <div class="settings-group">
            <label class="settings-label">글꼴</label>
            <div class="font-btns">
              <button class="font-btn active" data-font="serif">바탕</button>
              <button class="font-btn" data-font="sans">고딕</button>
              <button class="font-btn" data-font="mono">등폭</button>
            </div>
          </div>

          <!-- 글자 크기 -->
          <div class="settings-group">
            <label class="settings-label"
              >글자 크기 <span id="font-size-val">18px</span></label
            >
            <input
              type="range"
              id="font-size-slider"
              min="14"
              max="28"
              step="1"
              value="18"
              class="slider"
            />
          </div>

          <!-- 줄간격 -->
          <div class="settings-group">
            <label class="settings-label"
              >줄간격 <span id="line-height-val">1.9</span></label
            >
            <input
              type="range"
              id="line-height-slider"
              min="1.4"
              max="2.6"
              step="0.1"
              value="1.9"
              class="slider"
            />
          </div>

          <!-- 최대 너비 -->
          <div class="settings-group">
            <label class="settings-label"
              >텍스트 너비 <span id="max-width-val">680px</span></label
            >
            <input
              type="range"
              id="max-width-slider"
              min="480"
              max="900"
              step="20"
              value="680"
              class="slider"
            />
          </div>
        </div>
        <!-- /settings-body -->

        <!-- 계정 정보 -->
        <div class="settings-footer">
          <div class="account-info" id="account-info"></div>
          <button id="btn-logout" class="btn-logout">로그아웃</button>
        </div>
      </div>

      <!-- 설정 패널 백드롭 -->
      <div class="backdrop hidden" id="settings-backdrop"></div>

      <!-- ── 토스트 알림 ── -->
      <div class="toast-wrap" id="toast-wrap"></div>

      <!-- ── 이어읽기 팝업 ── -->
      <div class="resume-popup hidden" id="resume-popup">
        <p class="resume-text" id="resume-text">3장 중간부터 이어볼까요?</p>
        <div class="resume-btns">
          <button id="btn-resume-yes" class="btn-resume-yes">이어 읽기</button>
          <button id="btn-resume-no" class="btn-resume-no">처음부터</button>
        </div>
      </div>
    </div>
    <!-- /app -->

    <!-- ══════════════════════════════════════
       Firebase SDK (모듈 방식)
  ══════════════════════════════════════ -->
    <script type="module">
      import { initApp } from "./src/js/firebase.js";
      initApp();
    </script>
  </body>
</html>
